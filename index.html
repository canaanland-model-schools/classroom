        .login-container {

            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            background: #0b2f4e;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

        .school-name {

            letter-spacing: 0.5px;
        }

        .school-motto {
            font-size: 0.8rem;
            color: #2c3e50;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 40px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            font-size: 1rem;
            outline: 1px solid transparent;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: 2px solid #0b2f4e;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #0b2f4e;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 8px 16px -6px #0b2f4e80;
        }

        .btn-login:hover {
            background: #154b6e;
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;

        const loginBtn = document.getElementById('login-btn');
        const usernameInp = document.getElementById('login-username');
        const passwordInp = document.getElementById('login-password');
        const errorDiv = document.getElementById('login-error');

        loginBtn.addEventListener('click', function() {
            const username = usernameInp.value.trim();
            const password = passwordInp.value.trim();

            const foundUser = validUsers.find(u => u.username === username && u.password === password);

            if (foundUser) {
                // Store user data in sessionStorage for dashboard to access
                sessionStorage.setItem('loggedUser', JSON.stringify(foundUser));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });

        // Enter key support
        passwordInp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });


         // ================== ANTI-CHEAT & LOGOUT ==================
