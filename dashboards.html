<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <title>Classroom · Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #eef2f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        /* logo container */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #f5b81b;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .logo img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 50%;
        }

        .dashboard-card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .dash-header {
            background: blue;
            color: white;
            padding: 1.2rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dash-logo {
            background: #f5b81b;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0b2f4e;
        }

        .welcome-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #cfddee;
            object-fit: cover;
            border: 2px solid white;
        }

        .username-display {
            font-weight: 600;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.15);
            padding: 6px 20px;
            border-radius: 40px;
        }

        .dash-body {
            padding: 30px 30px 40px;
            text-align: center;
        }

        .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            background: #f8fafd;
            padding: 25px;
            border-radius: 28px;
            justify-content: center;
        }

        .select-block {
            flex: 1 1 160px;
            min-width: 160px;
        }

        .select-block label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e50;
            margin-bottom: 6px;
            display: block;
            text-align: left;
        }

        .select-block select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccd9e6;
            border-radius: 30px;
            background: white;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            text-align: left;
        }

        .password-section {
            background: blue;
            border-radius: 28px;
            padding: 25px;
            margin: 20px 0 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .password-section label {
            font-weight: 600;
            color: red;
        }

        .password-section input {
            flex: 2 1 250px;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: white;
            border: 1px solid rgb(50,125,50);
            font-size: 1rem;
            max-width: 400px;
        }

        .btn-redirect {
            background: #0b2f4e;
            color: white;
            padding: 14px 36px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px #0b2f4e40;
            white-space: nowrap;
        }

        .btn-redirect:hover {
            background: #1f4b6e;
        }

        .redirect-message {
            margin-top: 10px;
            font-weight: 500;
            min-height: 30px;
            color: #1e4b6e;
            text-align: center;
        }

        hr {
            margin: 30px 0 10px;
            border: 1px dashed #cbd5e1;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .windows-activate {
            text-align: center;
            margin-top: 30px;
            color: #2c3e50;
            font-size: 14px;
            padding: 15px;
            background-color: #f0f4f9;
            border-radius: 8px;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <!-- School logo -->
        <div class="logo-container">
            <div class="logo">
                <img src="img/Ctemplogo.png" alt="School Logo">
            </div>
        </div>

        <div class="dashboard-card">
            <div class="dash-header">
                <div class="header-left">
                    <div class="dash-logo"><i class="fas fa-microchip"></i></div>
                    <div style="font-size:1.5rem; font-weight:600;">CANAANLAND SCHOOLS CLASSROOM DASHBOARD</div>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="welcome-row" id="userWelcome"></div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            
            <div class="dash-body">
                <div style="font-size:1.8rem; font-weight:300; margin-bottom:10px;">👋 Welcome, <span id="welcomeUsername"></span></div>
                <p style="color:#2d4a6e;">Select term, session, class, subject and week, then enter the week password.</p>

                <div class="filter-grid">
                    <div class="select-block">
                        <label>📆 Session</label>
                        <select id="sessionSelect">
                            <option value="2025-2026">2025-2026</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📚 Class</label>
                        <select id="classSelect">
                            <option value="JSS1">JSS1</option>
                            <option value="JSS2">JSS2</option>
                            <option value="JSS3">JSS3</option>
                            <option value="SS1">SS1</option>
                            <option value="SS2">SS2</option>
                            <option value="SS3">SS3</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📝 Term</label>
                        <select id="termSelect">
                            <option value="Third_Term">Third Term</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>🧪 Subject</label>
                        <select id="subjectSelect">
                            <option value="Mathematics">Mathematics</option>
                            <option value="Digital_Technology">Digital_Technology</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📅 Week</label>
                        <select id="weekSelect"></select>
                    </div>
                </div>

                <div class="password-section">
                    <label for="weekPass"><i class="fas fa-key"></i> ENTER PASSWORD FOR THE WEEK TUTORIAL:</label>
                    <input type="password" id="weekPassInput" placeholder="enter password for selected subject & week">
                    <button class="btn-redirect" id="redirectBtn"><i class="fas fa-arrow-right"></i> Go to lesson page</button>
                </div>

                <div id="redirectMessage" class="redirect-message"></div>
                <hr>
                <div class="windows-activate">
                    <p>&copy; 2026 canaanland-schools classroom</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========================
        // CLEAR PASSWORD ARRAY (Easy to read & edit)
        // Format: password[subject][week] = "password"
        // Only subject and week matter (same password for all classes/terms/sessions)
        // ========================
        const subjectPasswords = {
            "Mathematics": {
                1: "math1",
                2: "math2",
                3: "math3",
                4: "math4",
                5: "math5",
                6: "math6",
                7: "math7",
                8: "math8",
                9: "math9"
            },
            "Digital_Technology": {
                1: "digi1",
                2: "digi2",
                3: "digi3",
                4: "digi4",
                5: "digi5",
                6: "digi6",
                7: "digi7",
                8: "digi8",
                9: "digi9"
            }
        };

        // ========================
        // LOGIN SESSION CHECK
        // ========================
        const loggedUser = JSON.parse(sessionStorage.getItem('loggedUser'));
        if (!loggedUser) {
            window.location.href = 'index.html';
        }

        // Populate user info
        const welcomeUsername = document.getElementById('welcomeUsername');
        const userWelcomeDiv = document.getElementById('userWelcome');
        welcomeUsername.textContent = loggedUser.username;
        userWelcomeDiv.innerHTML = `
            <span class="username-display"><i class="far fa-smile"></i> ${loggedUser.username}</span>
            <img src="img/${loggedUser.image}" alt="user" class="user-img" onerror="this.src='https://via.placeholder.com/48?text=User';">
        `;

        // Populate week select (1 to 9)
        const weekSelect = document.getElementById('weekSelect');
        for (let i = 1; i <= 9; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `Week ${i}`;
            weekSelect.appendChild(option);
        }

        // DOM elements
        const sessionSel = document.getElementById('sessionSelect');
        const classSel = document.getElementById('classSelect');
        const termSel = document.getElementById('termSelect');
        const subjectSel = document.getElementById('subjectSelect');
        const weekSel = document.getElementById('weekSelect');
        const passInput = document.getElementById('weekPassInput');
        const msgDiv = document.getElementById('redirectMessage');
        const redirectBtn = document.getElementById('redirectBtn');

        // Auto-fill password when subject or week changes
        function autoFillPassword() {
            const subject = subjectSel.value;
            const week = parseInt(weekSel.value, 10);
            if (subjectPasswords[subject] && subjectPasswords[subject][week]) {
                passInput.value = subjectPasswords[subject][week];
                msgDiv.innerHTML = ''; // clear any old error
            } else {
                passInput.value = '';
                msgDiv.innerHTML = '⚠️ No password defined for this subject/week.';
            }
        }

        subjectSel.addEventListener('change', autoFillPassword);
        weekSel.addEventListener('change', autoFillPassword);
        autoFillPassword(); // initial fill

        // Redirect handler
        redirectBtn.addEventListener('click', function() {
            const session = sessionSel.value;
            const className = classSel.value;
            const term = termSel.value;
            const subject = subjectSel.value;
            const weekNum = weekSel.value;
            const enteredPass = passInput.value.trim();

            // Get expected password from our array
            const expectedPass = subjectPasswords[subject] ? subjectPasswords[subject][parseInt(weekNum, 10)] : null;

            if (!expectedPass) {
                msgDiv.innerHTML = '❌ No password defined for this subject/week combination. Contact admin.';
                return;
            }

            if (enteredPass !== expectedPass) {
                msgDiv.innerHTML = '❌ Incorrect week password. Please check and try again.';
                return;
            }

            // Build the target HTML filename
            // Format: 2025-2026_JSS1_Third_Term_Mathematics_Week1_Class.html
            // Subject name may have underscores already (e.g., Digital_Technology) – keep as is.
            const redirectUrl = `${session}_${className}_${term}_${subject}_Week${weekNum}_Class.html`;
            
            msgDiv.innerHTML = `✅ Access granted! Redirecting to lesson page...`;
            
            // Store current selections for the target page (optional)
            sessionStorage.setItem('currentClass', JSON.stringify({
                session: session,
                className: className,
                term: term,
                subject: subject,
                week: weekNum,
                redirectUrl: redirectUrl
            }));

            // Direct redirect – no broken existence check
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 600);
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('loggedUser');
            sessionStorage.removeItem('currentClass');
            window.location.href = 'index.html';
        });

        // ========================
        // ANTI-CHEAT (keep as before)
        // ========================
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
            alert("Right-click is disabled during examination.");
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                alert("Developer tools are disabled during examination.");
            }
        });
    </script>
    
</body>
</html>
