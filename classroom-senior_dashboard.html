<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <title>Classroom · Dashboard | Canaanland</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #eef2f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
            position: relative;
            z-index: 1;
        }
       
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('img/Ctemplogo.png') no-repeat center center;
            background-size: 300px 300px;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
        }
       
        .logo {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            border: 3px solid #f5b81b;
        }
        .logo img {
            width: 85px;
            height: 85px;
            object-fit: contain;
            border-radius: 50%;
        }

        .dashboard-card {
            max-width: 1250px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .dash-header {
            background: linear-gradient(135deg, #0b2f4e 0%, #1c4e6e 100%);
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dash-logo {
            background: #f5b81b;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            color: #0b2f4e;
        }

        .welcome-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #cfddee;
            object-fit: cover;
            border: 2px solid white;
        }

        .username-display {
            font-weight: 600;
            font-size: 1rem;
            background: rgba(255,255,255,0.15);
            padding: 6px 18px;
            border-radius: 40px;
        }

        .dash-body {
            padding: 30px 30px 40px;
            text-align: center;
        }

        .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            background: #f8fafd;
            padding: 25px;
            border-radius: 28px;
            justify-content: center;
        }

        .select-block {
            flex: 1 1 170px;
            min-width: 160px;
        }

        .select-block label {
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e50;
            margin-bottom: 6px;
            display: block;
            text-align: left;
        }

        .select-block select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccd9e6;
            border-radius: 30px;
            background: white;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .select-block select:focus {
            border-color: #0b2f4e;
            box-shadow: 0 0 0 2px rgba(11,47,78,0.2);
        }

        .password-section {
            background: #eef3fc;
            border-radius: 28px;
            padding: 25px 20px;
            margin: 20px 0 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .password-section label {
            font-weight: 700;
            color: #0b2f4e;
        }

        .password-section input {
            flex: 2 1 280px;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: white;
            border: 1px solid #cbdde9;
            font-size: 1rem;
            max-width: 380px;
        }

        .btn-redirect {
            background: #0b2f4e;
            color: white;
            padding: 14px 36px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px rgba(11,47,78,0.3);
            white-space: nowrap;
        }

        .btn-redirect:hover {
            background: #1f4b6e;
            transform: scale(1.02);
        }

        .redirect-message {
            margin-top: 16px;
            font-weight: 500;
            min-height: 50px;
            color: #1e4b6e;
            text-align: center;
            font-size: 0.9rem;
        }

        hr {
            margin: 30px 0 15px;
            border: 1px dashed #cbd5e1;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }

        .windows-activate {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 40px;
            color: #2c3e50;
        }

        @media (max-width: 750px) {
            .dash-body { padding: 20px; }
            .filter-grid { gap: 12px; }
            .select-block { min-width: 140px; }
            .btn-redirect { padding: 12px 24px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <!-- Logo top -->
        <div class="logo-container">
            <div class="logo">
                <img src="img/Ctemplogo.png" alt="School Logo" onerror="this.src='https://placehold.co/90x90?text=CMS'">
            </div>
        </div>

        <div class="dashboard-card">
            <div class="dash-header">
                <div class="header-left">
                    <div class="dash-logo"><i class="fas fa-chalkboard-user"></i></div>
                    <div style="font-size:1.3rem; font-weight:600;">CANAANLAND SCHOOLS<br><span style="font-size:0.8rem;">LESSON & CBT PORTAL</span></div>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="welcome-row" id="userWelcome"></div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            
            <div class="dash-body">
                <div style="font-size:1.9rem; font-weight:300; margin-bottom:8px;">👋 Hello, <span id="welcomeUsername" style="font-weight:600;"></span></div>
                <p style="color:#2d4a6e; margin-bottom:10px;">Select session, class, term, subject & week → enter week password → access lesson</p>

                <div class="filter-grid">
                    <div class="select-block">
                        <label>📆 Session</label>
                        <select id="sessionSelect">
                            <option value="2025-2026">2025-2026</option>
                            <option value="2026-2027">2026-2027</option>
                            <option value="2027-2028">2027-2028</option>
                            <option value="2028-2029">2028-2029</option>
                            <option value="2029-2030">2029-2030</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📚 Class</label>
                        <select id="classSelect">
                            
                            <option value="SS1">SS 1</option>
                            <option value="SS2">SS 2</option>
                            <option value="SS3">SS 3</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📝 Term</label>
                        <select id="termSelect">
                            <option value="First_Term">First Term</option>
                            <option value="Second_Term">Second Term</option>
                            <option value="Third_Term">Third Term</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>🧪 Subject</label>
                        <select id="subjectSelect"></select> <!-- dynamically filled with your exact subject list -->
                    </div>
                    <div class="select-block">
                        <label>📅 Week</label>
                        <select id="weekSelect"></select>
                    </div>
                </div>

                <div class="password-section">
                    <label for="weekPassInput"><i class="fas fa-key"></i> WEEK PASSWORD:</label>
                    <input type="password" id="weekPassInput" placeholder="Enter week password (auto-filled)" autocomplete="off">
                    <button class="btn-redirect" id="redirectBtn"><i class="fas fa-arrow-right"></i> Launch lesson</button>
                </div>

                <div id="redirectMessage" class="redirect-message"></div>
                
                <hr>
                <div class="windows-activate">
                    <p>&copy; 2026 Canaanland Schools CBT · Secure digital classroom</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ======================== EXACT SUBJECT LIST AS PROVIDED ========================
        const SUBJECT_LIST = [
            { value: "demo", label: "Demo" },
            { value: "mathematics", label: "Mathematics" },
            { value: "english_language", label: "English Language" },
            { value: "chemistry", label: "Chemistry" },
            { value: "biology", label: "Biology" },
            { value: "yoruba", label: "Yoruba" },
            { value: "citizenship_education", label: "Citizenship | Heritage Studies" },
            { value: "livestock_farming", label: "Livestock Farming" },
            { value: "literature_in_english", label: "Literature in English" },
            { value: "crs", label: "Christian Religious Studies" },
            { value: "physics", label: "Physics" },
            { value: "digital_technology", label: "Digital Technology" },
            { value: "economics", label: "Economics" },
            { value: "geography", label: "Geography" },
            { value: "account", label: "Financial Accounting" },
            { value: "government", label: "Government" },
            { value: "commerce", label: "Commerce" },
            { value: "marketing", label: "Marketing" },
            { value: "fine_art", label: "Fine Art" },
            { value: "further_mathematics", label: "Further Mathematics" },
            { value: "history", label: "Nigerian History" },
            { value: "phonetics", label: "Phonetics" },
            { value: "agricultural_science", label: "Agric sciences" }
        ];

        // Generate password map for all subjects & weeks (robust)
        const weekPasswordStore = new Map();

        // Helper: generate simple password from subject value + week number
        function generatePasswordForSubject(subjectValue, weekNum) {
            // Use subject value as base (e.g., 'mathematics', 'english_language')
            let base = subjectValue.toLowerCase().replace(/[&\/\\#,+()$~%.'":*?<>{}]/g, '');
            // Special short forms for common subjects to make passwords memorable
            const shortMap = {
                'mathematics': 'math',
                'english_language': 'eng',
                'chemistry': 'chem',
                'biology': 'bio',
                'physics': 'phy',
                'economics': 'eco',
                'geography': 'geo',
                'government': 'govt',
                'commerce': 'comm',
                'account': 'acc',
                'crs': 'crs',
                'yoruba': 'yor',
                'digital_technology': 'digi',
                'literature_in_english': 'lit',
                'further_mathematics': 'fmath',
                'agricultural_science': 'agri',
                'livestock_farming': 'live',
                'citizenship_education': 'citz',
                'phonetics': 'phone',
                'fine_art': 'art',
                'marketing': 'mkt',
                'history': 'hist',
                'demo': 'demo'
            };
            if (shortMap[base]) base = shortMap[base];
            // fallback: take first 5 chars
            if (base.length > 8) base = base.substring(0, 6);
            return `${base}${weekNum}`;
        }

        // Pre-populate password map for all sessions, classes, terms, subjects & weeks 1-14
        const sessionsForMap = ['2025-2026', '2026-2027', '2027-2028', '2028-2029', '2029-2030'];
        const classesForMap = ['JSS1', 'JSS2', 'JSS3', 'SS1', 'SS2', 'SS3'];
        const termsForMap = ['First_Term', 'Second_Term', 'Third_Term'];
        
        // dynamically fill map
        for (let sess of sessionsForMap) {
            for (let cls of classesForMap) {
                for (let trm of termsForMap) {
                    for (let subj of SUBJECT_LIST) {
                        for (let w = 1; w <= 14; w++) {
                            const keyMap = `${sess}_${cls}_${trm}_${subj.value}_Week${w}`;
                            const pass = generatePasswordForSubject(subj.value, w);
                            weekPasswordStore.set(keyMap, pass);
                        }
                    }
                }
            }
        }

        // ======================== CHECK LOGGED USER ========================
        const loggedUser = JSON.parse(sessionStorage.getItem('loggedUser'));
        if (!loggedUser) {
            window.location.href = 'index.html';
        }

        // Display user info
        const welcomeRow = document.getElementById('userWelcome');
        const welcomeUsernameSpan = document.getElementById('welcomeUsername');
        welcomeUsernameSpan.textContent = loggedUser.username || "Student";
        welcomeRow.innerHTML = `
            <span class="username-display"><i class="far fa-smile"></i> ${loggedUser.username}</span>
            <img src="img/${loggedUser.image || 'default.png'}" alt="user" class="user-img" onerror="this.src='https://ui-avatars.com/api/?background=0b2f4e&color=fff&name=${encodeURIComponent(loggedUser.username)}';">
        `;

        // ======================== POPULATE WEEK SELECT (1-14) ========================
        const weekSelect = document.getElementById('weekSelect');
        for (let i = 1; i <= 14; i++) {
            const option = document.createElement('option');
            option.value = `Week${i}`;
            option.textContent = `Week ${i}`;
            weekSelect.appendChild(option);
        }

        // ======================== POPULATE SUBJECT SELECT (EXACT LIST FROM REQUIREMENT) ========================
        const subjectSelect = document.getElementById('subjectSelect');
        // Add empty default option
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "-- Select Subject --";
        defaultOption.disabled = true;
        defaultOption.selected = true;
        subjectSelect.appendChild(defaultOption);
        
        SUBJECT_LIST.forEach(subject => {
            const option = document.createElement('option');
            option.value = subject.value;
            option.textContent = subject.label;
            subjectSelect.appendChild(option);
        });

        // Function to update attempt status (dummy - for compatibility with onchange if needed)
        window.updateAttemptStatus = function() {
            // can be implemented later, just for compatibility
            console.log("Subject changed, attempt status updated");
            updateAutoPassword();
        };

        // DOM references
        const sessionSel = document.getElementById('sessionSelect');
        const classSel = document.getElementById('classSelect');
        const termSel = document.getElementById('termSelect');
        const passInput = document.getElementById('weekPassInput');
        const redirectBtn = document.getElementById('redirectBtn');
        const msgDiv = document.getElementById('redirectMessage');

        // ========== FUNCTION TO AUTO-FILL PASSWORD BASED ON SELECTIONS ==========
        function updateAutoPassword() {
            const session = sessionSel.value;
            const className = classSel.value;
            const term = termSel.value;
            const subjectValue = subjectSelect.value;
            const weekVal = weekSelect.value;  // "Week1" format
            if (!session || !className || !term || !subjectValue || !weekVal) {
                passInput.value = '';
                return;
            }
            
            const mapKey = `${session}_${className}_${term}_${subjectValue}_${weekVal}`;
            const foundPass = weekPasswordStore.get(mapKey);
            if (foundPass) {
                passInput.value = foundPass;
            } else {
                // fallback: generate on the fly
                const weekNumber = parseInt(weekVal.replace('Week', ''));
                const fallback = generatePasswordForSubject(subjectValue, weekNumber);
                passInput.value = fallback;
            }
        }

        // ========== ASYNC PAGE CHECK WITH CORS-FRIENDLY & FALLBACK ==========
        async function pageExists(url) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                const response = await fetch(url, { method: 'HEAD', signal: controller.signal });
                clearTimeout(timeoutId);
                return response.ok;
            } catch (err) {
                return false;
            }
        }

        async function redirectWithFallback(primaryUrl, fallbackUrl = 'default_lesson.html') {
            msgDiv.innerHTML = `⏳ Checking lesson page...`;
            const exists = await pageExists(primaryUrl);
            if (exists) {
                msgDiv.innerHTML = `✅ Access confirmed! Redirecting to lesson.`;
                window.location.href = primaryUrl;
            } else {
                msgDiv.innerHTML = `⚠️ Lesson page not ready (${primaryUrl}). Contact admin.`;
                console.warn(`Missing: ${primaryUrl}`);
                window.location.href = fallbackUrl;
            }
        }

        // ========== MAIN REDIRECT EVENT ==========
        redirectBtn.addEventListener('click', async function (e) {
            e.preventDefault();
            const session = sessionSel.value;
            const className = classSel.value;
            const term = termSel.value;
            const subjectValue = subjectSelect.value;
            const weekVal = weekSelect.value;
            
            if (!subjectValue) {
                msgDiv.innerHTML = '❌ Please select a subject.';
                return;
            }
            
            const mapKey = `${session}_${className}_${term}_${subjectValue}_${weekVal}`;
            const expectedPassword = weekPasswordStore.get(mapKey);
            const enteredPassword = passInput.value.trim();
            
            if (!expectedPassword) {
                msgDiv.innerHTML = '⚠️ Password definition missing for this combination.';
                return;
            }
            
            if (enteredPassword !== expectedPassword) {
                msgDiv.innerHTML = `🔐 Incorrect password for ${subjectSelect.options[subjectSelect.selectedIndex]?.text || subjectValue} ${weekVal}. Hint: ${expectedPassword.substring(0,3)}... Try again.`;
                return;
            }
            
            // build URL: Session_Class_Term_SubjectValue_WeekX_Class.html
            // clean subject value for URL (replace underscores and spaces)
            let subjectFile = subjectValue.replace(/[&\/\\#,+()$~%.'":*?<>{}]/g, '').replace(/\s+/g, '_');
            // Additional mapping for specific readable names
            if (subjectValue === 'citizenship_education') subjectFile = 'Citizenship_Education';
            if (subjectValue === 'literature_in_english') subjectFile = 'Literature_in_English';
            if (subjectValue === 'digital_technology') subjectFile = 'Digital_Technology';
            if (subjectValue === 'further_mathematics') subjectFile = 'Further_Mathematics';
            if (subjectValue === 'agricultural_science') subjectFile = 'Agricultural_Science';
            if (subjectValue === 'livestock_farming') subjectFile = 'Livestock_Farming';
            if (subjectValue === 'english_language') subjectFile = 'English_Language';
            if (subjectValue === 'financial_accounting') subjectFile = 'Financial_Accounting';
            
            const redirectUrl = `${session}_${className}_${term}_${subjectFile}_${weekVal}_Class.html`;
            
            // Store context for target page
            sessionStorage.setItem('currentLessonContext', JSON.stringify({
                session, className, term, subject: subjectValue, week: weekVal,
                redirectUrl: redirectUrl
            }));
            
            msgDiv.innerHTML = `✅ Password correct! Loading lesson...`;
            setTimeout(async () => {
                await redirectWithFallback(redirectUrl, 'lesson_unavailable.html');
            }, 500);
        });

        // ========== EVENT LISTENERS FOR AUTO-FILL PASSWORD ==========
        [sessionSel, classSel, termSel, subjectSelect, weekSelect].forEach(el => {
            el.addEventListener('change', () => {
                updateAutoPassword();
                msgDiv.innerHTML = ''; // clear previous messages on change
            });
        });
        
        // Call updateAttemptStatus when subject changes (for compatibility with onchange attribute)
        subjectSelect.addEventListener('change', function() {
            if (typeof window.updateAttemptStatus === 'function') {
                window.updateAttemptStatus();
            }
            updateAutoPassword();
        });
        
        // Initial auto-fill
        updateAutoPassword();
        
        // Log subject count for verification
        console.log(`✅ Subjects loaded: ${SUBJECT_LIST.length} subjects available`);
        
        // ======================== LOGOUT FUNCTION ========================
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('loggedUser');
            sessionStorage.removeItem('currentLessonContext');
            window.location.href = 'index.html';
        });
        
        // ======================== ANTI-CHEAT MEASURES ========================
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
            alert("Right-click is restricted on academic portal.");
        });
        
        document.addEventListener('keydown', function (e) {
            const key = e.key.toLowerCase();
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j')) || 
                (e.ctrlKey && key === 'u') || (e.ctrlKey && key === 's' && e.target.tagName !== 'INPUT')) {
                e.preventDefault();
                alert("Developer tools are disabled on this portal.");
            }
        });
        
        // session guard
        window.addEventListener('load', () => {
            if (!sessionStorage.getItem('loggedUser')) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
